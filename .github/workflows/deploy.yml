name: Build and Deploy to DreamHost

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build the project
        run: npm run build

      - name: Deploy to DreamHost via SFTP
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: /home/${{ secrets.DREAMHOST_USERNAME }}/public_html/
          remote_host: ${{ secrets.DREAMHOST_HOST }}
          remote_user: ${{ secrets.DREAMHOST_USERNAME }}
          remote_key: ${{ secrets.DREAMHOST_SSH_KEY }}
          remote_key_pass: ${{ secrets.DREAMHOST_SSH_PASSPHRASE }}

      - name: Deployment Success
        run: echo "✅ Deployed to 77rentals.com successfully!"
